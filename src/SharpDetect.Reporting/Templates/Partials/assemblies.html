<div class="table-filter">
    <input type="text" id="assembliesFilter" placeholder="Search assemblies by name or path..." oninput="filterTable('assembliesFilter', 'assembliesTable')">
</div>
<div class="table-container">
    <table class="data-table" id="assembliesTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Version</th>
                <th>Public Key</th>
                <th>Culture</th>
                <th>PID</th>
                <th>Path</th>
            </tr>
        </thead>
        <tbody>
        {{#assemblies}}
            <tr>
                <td><strong>{{name}}</strong></td>
                <td class="text-mono">{{version}}</td>
                <td class="text-mono text-sm">{{publicKey}}</td>
                <td>{{culture}}</td>
                <td class="text-mono">{{processId}}</td>
                <td class="text-mono text-sm" title="{{path}}">{{path}}</td>
            </tr>
        {{/assemblies}}
        </tbody>
    </table>
</div>
