{{#if reports}}
<div class="violations-toolbar">
    <input type="text" id="violationsFilter" placeholder="Search deadlocks by thread, description..." oninput="filterViolations()">
    <button class="btn" onclick="toggleAllViolations(true)">Expand All</button>
    <button class="btn" onclick="toggleAllViolations(false)">Collapse All</button>
</div>

<div id="violationsContainer">
{{#reports}}
<details class="violation-card" data-searchable>
    <summary>
        <span class="card-title">{{title}}</span>
        <span class="card-desc">{{description}}</span>
        <span class="card-pid-badge">PID {{processId}}</span>
        <span class="card-timestamp">{{timestamp}}</span>
    </summary>
    <div class="violation-card-body">
        {{> threads}}
    </div>
</details>
{{/reports}}
</div>

{{else}}
<div class="no-violations-message">
    <div class="message-title">No deadlocks detected</div>
    <div class="message-desc">No circular wait dependencies were found.</div>
</div>
{{/if}}
