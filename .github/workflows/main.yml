name: CI

on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  native-unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.*
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: Native unit tests
      run: |
        cd src
        dotnet tool restore
        dotnet cake --rid=${{ matrix.rid }} --target=Test-Native

  managed-unit-tests:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.*
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: Managed unit tests
      run: |
        cd src
        dotnet tool restore
        dotnet cake --rid=${{ matrix.rid }} --target=Test-Unit
    - name: Report test results
      uses: dorny/test-reporter@v3
      if: ${{ !cancelled() }}
      with:
        name: Managed unit tests (${{ matrix.rid }})
        path: src/TestResults/**/*.trx
        reporter: dotnet-trx
    - name: Upload coverage data
      uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: coverage-data-unit-${{ matrix.rid }}
        path: src/TestResults/**/coverage.cobertura.xml
        if-no-files-found: warn

  e2e-tests:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.*
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: E2E tests
      run: |
        cd src
        dotnet tool restore
        dotnet cake --rid=${{ matrix.rid }} --target=Test-E2E
    - name: Report test results
      uses: dorny/test-reporter@v3
      if: ${{ !cancelled() }}
      with:
        name: E2E tests (${{ matrix.rid }})
        path: src/TestResults/**/*.trx
        reporter: dotnet-trx
    - name: Upload coverage data
      uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: coverage-data-e2e-${{ matrix.rid }}
        path: src/TestResults/**/coverage.cobertura.xml
        if-no-files-found: warn

  coverage:
    needs: [managed-unit-tests, e2e-tests]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.*
        cache: true
        cache-dependency-path: src/Directory.Packages.props
    - name: Download coverage data
      uses: actions/download-artifact@v7
      with:
        pattern: coverage-data-*
        path: src/TestResults
        merge-multiple: true
    - name: Generate combined coverage report
      run: |
        cd src
        dotnet tool restore
        dotnet cake --target=Coverage-Report
    - name: Write coverage to job summary
      shell: bash
      run: cat src/TestResults/CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: src/TestResults/CoverageReport
        if-no-files-found: warn