name: CI

on: ["push"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        rid: [win-x64, linux-x64]
        exclude:
          # Cross-compilation is not supported 
          - os: ubuntu-latest
            rid: win-x64
          - os: windows-latest
            rid: linux-x64
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.*
    - name: Build
      run: |
        cd src
        dotnet tool restore
        dotnet cake --rid=${{ matrix.rid }}

  tests:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        rid: [win-x64, linux-x64]
        exclude:
          # Cross-compilation is not supported 
          - os: ubuntu-latest
            rid: win-x64
          - os: windows-latest
            rid: linux-x64
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.*
    - name: Tests
      run: |
        cd src
        dotnet tool restore
        dotnet cake --rid=${{ matrix.rid }} --target=CI-Tests
    - name: Report test results
      uses: dorny/test-reporter@v3
      if: ${{ !cancelled() }}
      with:
        name: Tests (${{ matrix.rid }})
        path: src/TestResults/**/*.trx
        reporter: dotnet-trx